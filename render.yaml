services:
  - type: web
    name: mediscribe
    runtime: docker
    plan: free
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mediscribe-db
          property: connectionURI

databases:
  - name: mediscribe-db
    plan: free
